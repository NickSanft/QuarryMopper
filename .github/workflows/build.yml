name: Build

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.1
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          set -e
          mkdir -p ~/godot && cd ~/godot
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -o Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot
          chmod +x godot
          echo "$HOME/godot" >> $GITHUB_PATH

      - name: Install export templates
        run: |
          set -e
          curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -o Godot_v${GODOT_VERSION}-stable_export_templates.tpz -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project
        run: |
          godot --headless --import || true
          godot --headless --import || true

      - name: Export Windows
        run: |
          mkdir -p build/win
          godot --headless --export-release "Windows Desktop" build/win/QuarryMopper.exe

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Package artifacts
        run: |
          cd build
          zip -r QuarryMopper-windows.zip win
          zip -r QuarryMopper-web.zip web

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/QuarryMopper-windows.zip
            build/QuarryMopper-web.zip

      - name: Deploy web build to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
