name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gdunit4:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          set -e
          mkdir -p ~/godot && cd ~/godot
          if [ ! -f godot ]; then
            curl -LO https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            unzip -o Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
            mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot
            chmod +x godot
          fi
          echo "$HOME/godot" >> $GITHUB_PATH

      - name: Install GdUnit4 addon
        run: |
          set -e
          mkdir -p addons
          if [ ! -d addons/gdUnit4 ]; then
            curl -L -o gdunit4.zip https://github.com/MikeSchulze/gdUnit4/releases/latest/download/gdUnit4.zip || \
              curl -L -o gdunit4.zip https://github.com/MikeSchulze/gdUnit4/archive/refs/heads/master.zip
            unzip -o gdunit4.zip -d gdunit4_tmp
            # Handle either release layout or source archive layout.
            if [ -d gdunit4_tmp/addons/gdUnit4 ]; then
              cp -r gdunit4_tmp/addons/gdUnit4 addons/
            else
              cp -r gdunit4_tmp/*/addons/gdUnit4 addons/
            fi
          fi

      - name: Import project
        run: |
          godot --headless --import || true
          godot --headless --import || true

      - name: Run GdUnit4 tests
        run: |
          godot --headless -d \
            -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            -a "res://tests" --continue
